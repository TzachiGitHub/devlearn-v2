<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DevLearn — Audio Mode</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="audio.css">
</head>
<body>

<div id="audio-app" class="audio-page">

  <!-- ── Header ── -->
  <header class="audio-header">
    <a href="index.html" class="audio-back-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
      </svg>
      Back
    </a>
    <span class="audio-header-title">🎧 Audio Mode</span>
    <div id="xp-display" class="audio-xp-badge">0 XP</div>
  </header>

  <!-- ── Mode Selector ── -->
  <div class="mode-selector" id="mode-selector">
    <!-- Filled by JS -->
  </div>

  <!-- ── Card Display Area ── -->
  <div class="audio-card-area" id="card-area">

    <div class="audio-card-visual" id="card-visual">
      <div class="audio-review-badge" id="review-badge" style="display:none">REVIEW</div>
      <div class="audio-card-emoji" id="card-emoji">🎧</div>
      <div class="sound-wave" id="sound-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="audio-card-topic" id="card-topic">—</div>
    <div class="audio-card-title" id="card-title">Tap play to start</div>
    <div class="audio-card-number" id="card-number">0 of 0 cards</div>
    <div class="status-label" id="status-label">Ready</div>

  </div>

  <!-- ── Session Progress ── -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Session Progress</span>
      <span id="session-time">0:00 / 0:00</span>
    </div>
    <div class="audio-progress-bar">
      <div class="audio-progress-fill" id="session-progress" style="width: 0%"></div>
    </div>
    <div class="progress-label">
      <span>Card</span>
      <span id="card-progress-label">—</span>
    </div>
    <div class="audio-progress-bar">
      <div class="audio-progress-fill" id="card-progress" style="width: 0%; background: linear-gradient(90deg, #10B981, #34D399)"></div>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div class="audio-controls" id="audio-controls">
    <div class="controls-row">
      <span style="font-size:12px; color:#6B7280;" id="mode-desc">—</span>
    </div>
    <div class="controls-row">
      <!-- Previous -->
      <button class="ctrl-btn ctrl-btn-md" id="btn-prev" onclick="audioPage.previousCard()" title="Previous card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 20L9 12l10-8v16z"/><line x1="5" y1="19" x2="5" y2="5"/>
        </svg>
      </button>

      <!-- Play/Pause -->
      <button class="ctrl-btn ctrl-play-pause" id="btn-play" onclick="audioPage.togglePlay()">
        <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
        <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <!-- Skip -->
      <button class="ctrl-btn ctrl-btn-md" id="btn-skip" onclick="audioPage.skipCard()" title="Skip card">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 4l10 8-10 8V4z"/><line x1="19" y1="5" x2="19" y2="19"/>
        </svg>
      </button>
    </div>

    <div class="controls-row">
      <button class="speed-btn" id="btn-speed" onclick="audioPage.toggleSpeed()">1.0×</button>
    </div>
  </div>

</div><!-- end #audio-app -->

<!-- ── Quiz Overlay ── -->
<div class="quiz-overlay" id="quiz-overlay">
  <div class="quiz-sheet">
    <div class="quiz-question" id="quiz-question">—</div>
    <div class="quiz-timer-bar">
      <div class="quiz-timer-fill" id="quiz-timer" style="width: 100%"></div>
    </div>
    <div class="quiz-buttons">
      <button class="quiz-btn quiz-btn-yes" onclick="audioPage.answerQuiz('yes')">✅ YES</button>
      <button class="quiz-btn quiz-btn-no" onclick="audioPage.answerQuiz('no')">❌ NO</button>
    </div>
    <div class="answer-reveal" id="answer-reveal">—</div>
  </div>
</div>

<!-- ── Session End Overlay ── -->
<div class="session-end-overlay" id="session-end">
  <div class="session-end-card">
    <div class="session-end-emoji">🔥</div>
    <div class="session-end-title">Session Complete!</div>
    <div class="session-end-stats" id="session-stats">—</div>
    <div class="session-end-xp" id="session-xp">+0 XP</div>
    <button class="btn-new-session" onclick="audioPage.restartSession()">New Session</button>
  </div>
</div>

<!-- ── Scripts ── -->
<script src="contextModes.js"></script>
<script src="audioCards.js"></script>
<script src="sessionBuilder.js"></script>
<script src="webSpeech.js"></script>
<script src="audioEngine.js"></script>
<script src="audioPage.js"></script>

</body>
</html>
